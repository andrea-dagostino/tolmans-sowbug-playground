grid:
  width: 20
  height: 20

simulation:
  max_ticks: 1000
  random_seed: 42

stimuli:
  - type: food
    position: [15, 10]
    intensity: 1.0
    radius: 6.0
    depletes: true
    depletion_rate: 0.05

  - type: food
    position: [3, 15]
    intensity: 0.8
    radius: 5.0
    depletes: true
    depletion_rate: 0.05

  - type: water
    position: [10, 3]
    intensity: 0.9
    radius: 4.0

  - type: light
    position: [10, 10]
    intensity: 1.0
    radius: 8.0

  - type: heat
    position: [18, 18]
    intensity: 0.7
    radius: 5.0

  - type: obstacle
    position: [7, 7]
    intensity: 1.0
    radius: 0.0

  - type: obstacle
    position: [7, 8]
    intensity: 1.0
    radius: 0.0

  - type: obstacle
    position: [7, 9]
    intensity: 1.0
    radius: 0.0

agent:
  type: sowbug
  position: [5, 5]
  hunger_rate: 0.01
  thirst_rate: 0.008
  temperature_rate: 0.005
  perception_radius: 5.0
  learning_rate: 0.1
  decay_rate: 0.01
  kernel_bandwidth: 2.0
